# =============================================================================
# Config mặc định cho mọi experiment. File trong configs/exp/*.yaml chỉ override
# những gì cần. KHÔNG sửa code Python để đổi model/hyperparam — sửa YAML.
# =============================================================================

experiment:
  id: null              # nếu null sẽ tự sinh từ model+method+hyperparam (xem utils/config.py)
  seed: 42

# --- Model ---
model:
  name: Qwen/Qwen3-4B-Instruct-2507   # HF repo id; override trong exp/
  # 1024 đủ cho đa số instruction (output TB ~250 token). Vocab lớn (Qwen 151k,
  # Gemma 256k) làm tensor logits = batch×seq×vocab rất tốn VRAM -> giữ seq vừa phải.
  max_seq_length: 1024
  load_in_4bit: false   # true => QLoRA (bắt buộc cho model >= 27B trên L40S 46GB)
  dtype: bfloat16       # L40S hỗ trợ bf16 tốt
  # use_unsloth: tạm để FALSE vì Unsloth (logits rỗng khi train) xung đột với metric
  # entropy của TRL 0.21 (entropy_from_logits crash). transformers+PEFT thuần ổn định,
  # trên L40S 46GB vẫn đủ VRAM cho LoRA bf16 <=12B và QLoRA model lớn. Bật lại khi đã
  # xử lý compat Unsloth<->TRL. Xem docs/RESEARCH_LOG.md.
  use_unsloth: false

# --- Phương pháp finetune ---
method: lora            # lora | qlora (qlora = lora + load_in_4bit)

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.0
  target_modules:       # attn + mlp; phù hợp Qwen3/Gemma
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: none
  use_gradient_checkpointing: unsloth   # "unsloth" | true | false

# --- Dữ liệu ---
data:
  mix_config: configs/data/instruction_mix_v1.yaml   # định nghĩa nguồn + tỉ lệ
  val_fraction: 0.10
  devset_size: 300       # subset cố định để sanity định tính
  max_train_samples: null  # null = dùng hết; đặt số nhỏ để debug nhanh

# --- Huấn luyện ---
train:
  output_dir: results/runs        # exp_id sẽ được nối vào: results/runs/<exp_id>
  num_train_epochs: 1    # 1 epoch đủ cho instruction tuning trên ~105K mẫu; nhanh + so sánh công bằng
  learning_rate: 2.0e-4
  lr_scheduler_type: linear
  warmup_ratio: 0.03
  weight_decay: 0.01
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4   # effective batch = 32
  per_device_eval_batch_size: 4    # nhỏ để tránh OOM lúc eval (logits vocab lớn)
  optim: adamw_8bit
  logging_steps: 10
  eval_steps: 500          # eval thưa hơn: val 11.7K mẫu rất tốn (~8 phút/lần) nếu eval dày
  max_eval_samples: 1500   # chỉ eval trên 1500 mẫu val (đủ theo dõi overfit, nhanh hơn ~8x)
  save_steps: 500
  save_total_limit: 2
  packing: true          # gói nhiều mẫu ngắn -> tăng throughput
  report_metric: eval_loss
  early_stopping_patience: 2
  # Liger Kernel: fused linear cross-entropy -> KHÔNG materialize full logits
  # [batch×seq×vocab]. Giảm ~60-80% VRAM cho model vocab lớn (Qwen 151k, Gemma 256k)
  # + nhanh ~20%. Hỗ trợ Qwen3/Gemma3. Cần `pip install liger-kernel`. Tự bỏ qua nếu chưa cài.
  use_liger_kernel: true

# --- Tracking ---
tracking:
  backend: auto          # auto | wandb | tensorboard | none (auto = thử W&B, fail thì TB)
  project: finetune-llm-vi
  tags: []
  force: false           # true: ép wandb dù check fail (không khuyến nghị)
  tb_logdir: null        # null => runs/tb/<exp_id>

# --- Đánh giá ---
eval:
  vmlu:
    enabled: true
    subset: 2000         # null = full 10880 câu; subset để lặp nhanh
    n_shot: 0
  aux:
    enabled: false       # bật ở run cuối; cấu hình task trong eval_general.py
    tasks: []
