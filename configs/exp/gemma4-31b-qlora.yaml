# Gemma-4-31B (dense) qua QLoRA 4-bit — kiểm tra trần chất lượng trên L40S 46GB.
# load_in_4bit=true là bắt buộc cho model 27-35B trên 1 GPU 46GB.
experiment:
  id: gemma4-31b_qlora-r16_lr2e4_ep1

model:
  name: google/gemma-4-31b        # verify repo id trên HF khi chạy
  load_in_4bit: true              # QLoRA
  max_seq_length: 1024

method: qlora

lora:
  use_gradient_checkpointing: unsloth

train:
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16   # effective batch = 16
  optim: adamw_8bit
